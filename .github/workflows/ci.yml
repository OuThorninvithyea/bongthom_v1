name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        working-directory: admin/admin-api
        run: go build ./ ...

      - name: Vet
        working-directory: admin/admin-api
        run: go vet ./ ...

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  go-api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin/admin-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: admin/admin-api/go.mod
          cache-dependency-path: admin/admin-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

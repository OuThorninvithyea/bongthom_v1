name: CI

on:
  push:
    branches: [Shawn]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Tidy modules
        working-directory: admin/admin-api
        run: go mod tidy

      - name: Build
        working-directory: admin/admin-api
        run: go build ./...

      - name: Vet
        working-directory: admin/admin-api
        run: go vet ./...

      - name: Notify on failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "❌ CI failed — bongthom_v1"
          description: "Commit: ${{ github.event.head_commit.message }}"
          color: 0xff0000

      - name: Notify on success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ CI passed — bongthom_v1"
          description: "Commit: ${{ github.event.head_commit.message }}"
          color: 0x00ff00

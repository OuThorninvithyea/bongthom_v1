services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kaifin-api:local
    container_name: kaifin-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 9000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET_KEY: change-me-in-production
      JWT_EXPIRE: 15m
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: bongthom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - bongthom-postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: bongthom-redis
    ports:
      - "6379:6379"
    volumes:
      - bongthom-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bongthom-postgres-data:
  bongthom-redis-data:
